<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cupón MEY-KO</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="coupon-wrapper">
        <div class="coupon">

            <!-- Header -->
            <div class="coupon-header">
                <img class="logo" src="img/LOGO1.png" alt="MEY-KO Logo" />
                <span class="badge">Cupón Exclusivo</span>
            </div>

            <!-- Cuerpo -->
            <div class="coupon-body">
                <p class="offer-label">Oferta especial</p>
                <div class="discount-value"><sup>%</sup>20<sup> OFF</sup></div>
                <p class="offer-description">
                    En tu próxima compra de <strong>productos seleccionados</strong>.<br />
                    Válido en compras dentro de la tienda.
                </p>
            </div>

            <!-- Separación dentada -->
            <!-- <div class="perforation">
                <div class="perforation-line"></div>
            </div> -->
            <!-- Sección del código -->
            <div class="coupon-code-section">
                <!-- <p class="code-label">Usa el código</p>
                    <div class="code-box"> MEYKO20</div> -->
                <p class="validity"> Válido hasta el <strong> 31 de julio de 2026</strong></p>
                <a class="cta-btn" href="https://meyko.com/">Canjear ahora</a>
            </div>

            <!-- Footer -->
            <div class="coupon-footer">
                <p>© 2026 Mey-Ko. Todos los derechos reservados.</p>
                <p class="terms">*Aplican restricciones. Un uso por cliente.</p>
            </div>

        </div>
    </div>
</body>

</html>
